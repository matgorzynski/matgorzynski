name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Aktualizacja raz dziennie
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: matgorzynski
          template: classic
          base: metadata
          config_timezone: Europe/Warsaw
          
          # KLUCZOWE USTAWIENIA NAPRAWCZE:
          config_order: base.header, languages, achievements, habits # Wymuszenie kolejności
          queries_errors_fatal: no  # To sprawi, że jeśli plugin sypnie błędem, reszta i tak się wygeneruje

          # Naprawa Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_ignored: member, maintainer # Ignorujemy sekcje, które mogą pytać o projekty

          # Naprawa Habits
          plugin_habits: yes
          plugin_habits_from: 50       # Zmniejszamy do 50, żeby nie trafić na "puste" eventy
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no      # Wyłączamy wykresy (to one najczęściej powodują błąd 'author')
          
          # Języki (zostawiamy, bo działały)
          plugin_languages: yes
          plugin_languages_limit: 8
